<section id="services" class="section section--dark">
    <div class="container">
        <div class="section-header animate-slide-left">
            <h2 class="section-title">{{ site_settings.services_title }}</h2>
        </div>
        <div class="services-grid">
            {% for service in services %}
            <div class="service-card animate-fade-up" data-delay="{{ forloop.counter0|add:forloop.counter0 }}00">
                <div class="service-card__icon">
                    {% if service.icon_svg %}
                        {{ service.icon_svg|safe }}
                    {% else %}
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                    {% endif %}
                </div>
                <div>
                    <h3 class="service-card__name">{{ service.name }}</h3>
                    {% if service.short_description %}
                    <p class="service-card__desc">{{ service.short_description }}</p>
                    {% endif %}
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
