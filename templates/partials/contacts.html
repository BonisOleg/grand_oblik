{% load static %}
<section id="contacts" class="section section--dark">
    <div class="container">
        <div class="section-header animate-slide-left">
            <h2 class="section-title">Контакти</h2>
            <p class="section-subtitle">Залишилися питання? Зв'яжіться з нами</p>
        </div>

        <div class="contact-info animate-fade-up">
            <div class="contact-info__block">
                <div class="contact-info__icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                </div>
                <div>
                    <div class="contact-info__label">Адреса</div>
                    <div class="contact-info__value"><!-- адреса офісу --></div>
                </div>
            </div>

            <div class="contact-info__block">
                <div class="contact-info__icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
                    </svg>
                </div>
                <div>
                    <div class="contact-info__label">Телефон</div>
                    <div class="contact-info__value">
                        <a href="tel:+380981234567">+38 (098) 123 45 67</a>
                    </div>
                </div>
            </div>

            <div class="contact-info__block">
                <div class="contact-info__icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                </div>
                <div>
                    <div class="contact-info__label">Електронна пошта</div>
                    <div class="contact-info__value">
                        <a href="mailto:info@grandобlik.com.ua">info@grandобlik.com.ua</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="contact-map animate-fade-up">
            <!-- Google Maps iframe: замінити на реальний embed -->
        </div>

        <div id="contact-form-container" class="contact-form-wrap animate-fade-up">
            {% include 'partials/_contact_form.html' %}
        </div>
    </div>
</section>
