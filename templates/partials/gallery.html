{% load image_tags %}
<section id="gallery" class="section section--dark">
    <div class="container">
        <div class="section-header animate-slide-left">
            <h2 class="section-title">Галерея</h2>
        </div>

        <div class="gallery-filters animate-fade-up">
            <button class="gallery-filter is-active" data-category="all">Усі</button>
            <button class="gallery-filter" data-category="completed">Збудовані об'єкти</button>
            <button class="gallery-filter" data-category="perspective">Перспективні проєкти</button>
        </div>

        <div class="gallery-grid">
            {% for img in gallery_images %}
            <div class="gallery-item animate-scale-in"
                 data-category="{{ img.category }}"
                 data-delay="{{ forloop.counter0|add:forloop.counter0 }}0">
                <img src="{{ img.image.url|webp }}" alt="{{ img.caption }}" loading="lazy">
                <div class="gallery-item__overlay">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                        <path d="M11 8v6M8 11h6"/>
                    </svg>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
