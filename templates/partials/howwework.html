<section class="section section--dark">
    <div class="container">
        <div class="section-header animate-slide-left">
            <h2 class="section-title">Як ми працюємо</h2>
        </div>
        <div class="steps">
            {% for step in work_steps %}
            <div class="step animate-fade-up" data-delay="{{ forloop.counter0|add:forloop.counter0 }}00">
                <div class="step__number">0{{ step.step_number }}</div>
                <div class="step__content">
                    <h3 class="step__title">{{ step.title }}</h3>
                    <p class="step__desc">{{ step.description }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
