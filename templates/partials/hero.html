{% load image_tags %}
{% for slide in hero_slides|slice:":1" %}
<section class="hero">
    <div class="hero__bg">
        <img src="{{ slide.image.url|webp }}" alt="{{ slide.title }}" loading="eager">
    </div>
    <div class="hero__overlay"></div>
    <div class="hero__content">
        <h1 class="hero__title">{{ slide.title }}</h1>
        <p class="hero__subtitle">{{ slide.subtitle }}</p>
        <div class="hero__cta">
            <a href="{{ slide.cta_link }}" class="btn btn--filled">{{ slide.cta_text }}</a>
        </div>
    </div>
    <div class="hero__scroll-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 9l6 6 6-6"/>
        </svg>
    </div>
</section>
{% empty %}
<section class="hero">
    <div class="hero__overlay" style="background: var(--bg-dark-alt);"></div>
    <div class="hero__content">
        <h1 class="hero__title">{{ site_settings.company_name }}</h1>
        <p class="hero__subtitle">{{ site_settings.slogan }}</p>
        <div class="hero__cta">
            <a href="#contacts" class="btn btn--filled">Зв'язатися</a>
        </div>
    </div>
</section>
{% endfor %}
