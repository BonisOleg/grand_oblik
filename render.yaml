databases:
  - name: stroika-db
    plan: free
    databaseName: stroika
    user: stroika

services:
  - type: web
    plan: free
    name: stroika
    runtime: python
    autoDeployTrigger: commit
    buildCommand: './build.sh'
    startCommand: 'gunicorn config.wsgi --bind 0.0.0.0:$PORT'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stroika-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: 'False'
      - key: ALLOWED_HOSTS
        value: '.onrender.com,elit-fasad-development.com.ua'
      - key: CSRF_TRUSTED_ORIGINS
        value: 'https://stroika.onrender.com,https://elit-fasad-development.com.ua'
      - key: USE_CLOUDINARY
        value: 'True'
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: '3.12.3'
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
